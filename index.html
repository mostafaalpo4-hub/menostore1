        // System Toasts Notifications
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `glass p-4 rounded-xl border flex items-center justify-between shadow-2xl transition-all duration-300 transform translate-y-2 opacity-0 text-sm ${
                type === 'error' ? 'border-red-500/50 text-red-200' : 'border-emerald-500/50 text-emerald-200'
            }`;
            toast.innerHTML = `<span>${message}</span><button class="ml-3 text-white/50 hover:text-white" onclick="this.parentElement.remove()">&times;</button>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        // --- SUBDOMAIN OR CUSTOM HOSTNAME ROUTER ROUTING CORE ---
        async function routeSubdomainsAndContent() {
            const hostname = window.location.hostname;
            const parts = hostname.split('.');
            
            // Configuration variables for routing domains
            let isSubdomain = false;
            let subdomainName = "";

            // Modified dynamic routing to support GitHub Pages and Localhost cleanly
            if (parts.length > 2 && parts[0] !== 'www' && !hostname.includes('localhost') && !hostname.includes('github.io') && !/^\d/.test(hostname)) {
                isSubdomain = true;
                subdomainName = parts[0];
            } else {
                // Testing mechanism for development layouts
                const urlParams = new URLSearchParams(window.location.search);
                if(urlParams.has('subdomain')) {
                    isSubdomain = true;
                    subdomainName = urlParams.get('subdomain');
                }
            }

            if (isSubdomain) {
                try {
                    const q = query(collection(db, "projects"), where("projectName", "==", subdomainName.toLowerCase().trim()));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        const projectData = querySnapshot.docs[0].data();
                        
                        document.open();
                        document.write(`
                            <!DOCTYPE html>
                            <html>
                            <head>
                                <meta charset="UTF-8">
                                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                <title>${subdomainName.toUpperCase()} | Sultan Sandbox Network</title>
                                <style>${projectData.cssCode || ''}</style>
                            </head>
                            <body>
                                ${projectData.htmlCode || '<h1>No Content Found</h1>'}
                                <script>${projectData.jsCode || ''}<\/script>
                            </body>
                            </html>
                        `);
                        document.close();
                        return true; 
                    } else {
                        render404View();
                        return true;
                    }
                } catch (error) {
                    console.error("Critical routing fail:", error);
                    render404View();
                    return true;
                }
            }
            return false;
        }

                                    <input type="email" id="auth-email-input" required class="glass-input text-sm text-white px-4 py-3 rounded-xl w-full" placeholder="you@example.com">

                                <div class="flex flex-col gap-1.5">

                                    <input type="password" id="auth-pwd-input" minlength="6" required class="glass-input text-sm text-white px-4 py-3 rounded-xl w-full" placeholder="••••••••">
                                </div>
                                <button type="submit" class="bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-bold text-sm py-3.5 rounded-xl transition w-full shadow-lg shadow-brand-600/10 mt-2">
                                    ${t.submitAuth}
                                </button>
                            </form>
                            <button id="auth-toggle-view-btn" class="text-xs text-brand-400 hover:text-brand-300 text-center transition font-medium">
                                ${isRegisterMode ? t.authToggleToLogin : t.authToggleToRegister}
                            </button>
                        </div>
                    </div>
                    ${renderFooter()}
                `;
                attachGlobalHeaderEventBindings();

                document.getElementById('auth-submission-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('auth-email-input').value.trim();

                    try {
                        if (isRegisterMode) {
                            await createUserWithEmailAndPassword(auth, email, password);

                    isRegisterMode = !isRegisterMode;

            }

        }

            content.innerHTML = `
                ${renderHeader()}
                <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8 min-h-[calc(100vh-140px)]">
                    <section class="lg:col-span-2 flex flex-col gap-6">
                        <div class="flex items-center justify-between">
                            <h2 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                                <i class="fa-solid fa-cubes text-brand-500"></i> ${t.prevProjects}
                            </h2>
                        </div>
                        <div id="projects-grid-root" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="col-span-2 text-slate-400 text-sm py-12 text-center glass rounded-xl border-dashed border-white/10"><i class="fa-solid fa-circle-notch animate-spin text-lg"></i></div>
                        </div>
                        
                        <div class="mt-auto">
                            <button id="trigger-chat-btn" class="w-full bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-extrabold text-sm py-4 rounded-xl shadow-xl shadow-brand-600/10 transition transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-comment-dots"></i> ${t.ctaStart}
                            </button>
                        </div>
                    </section>

                    <section id="chat-section-container" class="glass rounded-2xl border-white/10 flex flex-col overflow-hidden h-[600px] lg:h-auto ${openChatAutomatically ? 'ring-2 ring-brand-500' : ''}">
                        <div class="p-4 border-b border-white/10 flex items-center gap-3 bg-white/5">
                            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span class="text-xs font-bold text-white tracking-wide uppercase">${t.chatTitle}</span>
                        </div>
                        <div id="chat-messages-stream" class="flex-grow overflow-y-auto p-4 flex flex-col gap-3 text-xs"></div>
                        <form id="chat-message-dispatch-form" class="p-3 border-t border-white/10 bg-slate-900/50 flex gap-2">
                            <input type="text" id="chat-raw-input" autocomplete="off" required class="glass-input text-xs px-3 py-2.5 rounded-xl flex-grow text-white" placeholder="${t.chatPlaceholder}">
                            <button type="submit" class="w-10 h-10 rounded-xl bg-brand-600 hover:bg-brand-500 flex items-center justify-center text-white transition shrink-0">
                                <i class="fa-solid fa-paper-plane text-xs"></i>
                            </button>
                        </form>
                    </section>
                </main>
                ${renderFooter()}
            `;
            attachGlobalHeaderEventBindings();

            document.getElementById('trigger-chat-btn').addEventListener('click', () => {
                document.getElementById('chat-section-container').scrollIntoView({ behavior: 'smooth' });
                document.getElementById('chat-section-container').classList.add('ring-2', 'ring-brand-500');
                document.getElementById('chat-raw-input').focus();
            });

            try {
                const projectsQuery = query(collection(db, "projects"), where("uid", "==", currentUser.uid));
                const projectsSnapshot = await getDocs(projectsQuery);
                const gridRoot = document.getElementById('projects-grid-root');
                
                if (projectsSnapshot.empty) {
                    gridRoot.innerHTML = `<div class="col-span-2 text-slate-400 text-xs py-12 px-6 text-center glass rounded-xl border border-dashed border-white/10 leading-relaxed">${t.noProjects}</div>`;
                } else {
                    gridRoot.innerHTML = '';
                    projectsSnapshot.forEach(docSnap => {
                        const project = docSnap.data();
                        const pCard = document.createElement('div');
                        pCard.className = "glass p-5 rounded-xl border border-white/5 flex flex-col justify-between items-start gap-4 hover:border-brand-500/30 transition group";
                        
                        const projectURL = window.location.hostname.includes('localhost') || window.location.hostname.includes('github.io')
                            ? `?subdomain=${project.projectName}` 
                            : `${window.location.protocol}//${project.projectName}.${window.location.hostname}`;
                        
                        pCard.innerHTML = `
                            <div class="w-full">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-xs font-black uppercase text-brand-400 tracking-wider">${project.projectName}</span>
                                    <span class="px-2 py-0.5 rounded text-[10px] bg-emerald-500/10 text-emerald-400 font-semibold border border-emerald-500/20">Active</span>
                                </div>
                                <h4 class="text-sm font-bold text-white mb-1 truncate">${project.projectName}.sultan.com</h4>
                            </div>
                            <a href="${projectURL}" target="_blank" class="text-[11px] font-bold text-indigo-400 group-hover:text-indigo-300 flex items-center gap-1 mt-2">
                                Launch Project Platform <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i>
                            </a>
                        `;
                        gridRoot.appendChild(pCard);
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('projects-grid-root').innerHTML = `<p class="text-red-400 text-xs">Error parsing live nodes infrastructure.</p>`;
            }

            const userChatRef = collection(db, "chats", currentUser.uid, "messages");
            const chatQueryOrdered = query(userChatRef, orderBy("timestamp", "asc"));

            if(unsubChat) unsubChat();

            const streamContainer = document.getElementById('chat-messages-stream');

            unsubChat = onSnapshot(chatQueryOrdered, (snapshot) => {
                streamContainer.innerHTML = '';
                if(snapshot.empty) {
                    streamContainer.innerHTML = `<div class="text-slate-500 text-center italic py-8">Initialize connection protocol by typing an idea below...</div>`;
                }
                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.senderId === currentUser.uid;
                    const bubbleWrapper = document.createElement('div');
                    bubbleWrapper.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'}`;
                    
                    bubbleWrapper.innerHTML = `
                        <div class="max-w-[85%] rounded-xl px-3.5 py-2.5 shadow-md leading-relaxed ${
                            isMe 
                            ? 'bg-gradient-to-br from-brand-700 to-indigo-700 text-white rounded-br-none' 
                            : 'glass border-white/10 text-slate-200 rounded-bl-none'
                        }">
                            <p class="break-words">${msg.text}</p>
                            <span class="block text-[8px] opacity-40 text-right mt-1">${msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...'}</span>
                        </div>
                    `;
                    streamContainer.appendChild(bubbleWrapper);
                });
                streamContainer.scrollTop = streamContainer.scrollHeight;
            }, (error) => {
                console.error("Chat sync stream disconnect error:", error);
            });

            document.getElementById('chat-message-dispatch-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const textInput = document.getElementById('chat-raw-input');
                const textValue = textInput.value.trim();
                if(!textValue) return;

                try {
                    textInput.value = '';
                    await addDoc(userChatRef, {
                        senderId: currentUser.uid,
                        text: textValue,
                        timestamp: serverTimestamp()
                    });
                } catch (err) {
                    showToast("Failed to dispatch stream payload data.", "error");
                }
            });
        }

        // GLASSMORPHISM ULTRA MODERN 404 DEPLOYMENT ERROR TEMPLATE
        function render404View() {
            const t = i18n[currentLang];
            const content = document.getElementById('view-content');
            
            // Get current base hub URL dynamic fallback
            const baseHub = window.location.hostname.includes('github.io') 
                ? `${window.location.protocol}//${window.location.hostname}${window.location.pathname}`
                : `${window.location.protocol}//${window.location.hostname}`;

            content.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4 text-center">
                    <div class="glass p-8 md:p-12 rounded-3xl border-white/10 shadow-2xl max-w-xl flex flex-col items-center gap-6 fade-in relative">
                        <div class="absolute -top-12 w-24 h-24 rounded-2xl bg-gradient-to-tr from-red-600 to-amber-500 flex items-center justify-center text-white text-4xl shadow-xl shadow-red-500/20">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <h1 class="text-2xl md:text-4xl font-black text-white mt-8 tracking-tight">${t.error404Title}</h1>
                        <p class="text-sm text-slate-400 leading-relaxed">${t.error404Desc}</p>
                        <button onclick="window.location.href='${baseHub}'" class="mt-2 bg-white/10 hover:bg-white/15 border border-white/10 text-white font-bold text-xs px-6 py-3 rounded-xl transition">
                            <i class="fa-solid fa-house-signal"></i> ${t.backHome}
                        </button>
                    </div>
                </div>
            `;
        }

        function attachGlobalHeaderEventBindings() {
            const langBtn = document.getElementById('lang-switch-btn');
            if (langBtn) {
                langBtn.addEventListener('click', () => {
                    currentLang = currentLang === 'en' ? 'ar' : 'en';
                    localStorage.setItem('lang', currentLang);
                    updateLayoutDirection();
                    window.refreshCurrentRoute();
                });
            }

            const authBtn = document.getElementById('auth-action-btn');
            if (authBtn) {
                authBtn.addEventListener('click', async () => {
                    if (currentUser) {
                        try {
                            if(unsubChat) { unsubChat(); unsubChat = null; }
                            await signOut(auth);
                            showToast("Identity session cleared cleanly.");
                            window.navigateToRoute('landing');
                        } catch (err) {
                            showToast("Error processing dynamic session revocation.", "error");
                        }
                    } else {
                        window.navigateToRoute('auth');
                    }
                });
            }
        }

        let currentRouteState = 'landing'; 
        let routeArgModifier = false;

        window.navigateToRoute = function(routeName, argModifier = false) {
            currentRouteState = routeName;
            routeArgModifier = argModifier;
            window.refreshCurrentRoute();
        };

        window.refreshCurrentRoute = function() {
            updateLayoutDirection();
            
            switch (currentRouteState) {
                case 'landing':
                    renderLandingView();
                    break;
                case 'auth':
                    renderAuthView();
                    break;
                case 'dashboard':
                    renderDashboardView(routeArgModifier);
                    break;
                default:
                    renderLandingView();
            }
        };

        async function runApplicationBoot() {
            updateLayoutDirection();
            
            const traceIntercepted = await routeSubdomainsAndContent();
            if (traceIntercepted) return;

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (currentRouteState === 'dashboard' && !user) {
                    currentRouteState = 'landing';
                }
                window.refreshCurrentRoute();
            });
        }

        runApplicationBoot();

    </script>
</body>
</html>
